<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <style>
        body { font-family: Arial; background: #f5f7fb; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 30px; box-sizing: border-box; }
        button { background: #4361ee; color: white; border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; }
        .error { color: red; margin-bottom: 10px; }
        a { color: #4361ee; text-decoration: none; }

        /* Адаптация для мобильных устройств */
        @media (max-width: 600px) {
            body {
                padding: 0;
            }
            .card {
                width: 100%;
                max-width: none;
                margin: 16px;
                padding: 40px 20px;
                border-radius: 28px;
            }
            input, button {
                padding: 16px 20px;
                font-size: 18px;
                border-radius: 40px;
            }
            h2 {
                font-size: 32px;
                margin-bottom: 30px;
            }
            p, a {
                font-size: 18px;
            }
        }
        @media (max-width: 400px) {
            .card {
                margin: 12px;
                padding: 30px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Регистрация</h2>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}
        <form method="POST">
            <input type="text" name="name" placeholder="Имя" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p style="margin-top: 20px;">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
    </div>
</body>
</html>
